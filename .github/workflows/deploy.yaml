name: Deploy to Elastic Beanstalk

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Build, Package & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 17
          cache: maven

      - name: Build JAR with Maven
        run: mvn clean package -DskipTests

      - name: Generate version label
        id: version
        run: echo "label=v${{ github.run_number }}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Create deployment bundle (ZIP)
        run: |
          mkdir -p deploy
          cp target/beanstalk-app.jar deploy/
          cd deploy && zip ../bundle.zip beanstalk-app.jar

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Upload bundle to S3
        run: |
          aws s3 cp bundle.zip \
            s3://${{ secrets.S3_BUCKET }}/deployments/bundle-${{ steps.version.outputs.label }}.zip

      - name: Create Elastic Beanstalk application version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name "${{ secrets.EB_APPLICATION_NAME }}" \
            --version-label    "${{ steps.version.outputs.label }}" \
            --source-bundle    S3Bucket="${{ secrets.S3_BUCKET }}",S3Key="deployments/bundle-${{ steps.version.outputs.label }}.zip" \
            --auto-create-application

      - name: Deploy to Elastic Beanstalk environment
        run: |
          aws elasticbeanstalk update-environment \
            --application-name  "${{ secrets.EB_APPLICATION_NAME }}" \
            --environment-name  "${{ secrets.EB_ENVIRONMENT_NAME }}" \
            --version-label     "${{ steps.version.outputs.label }}"

      - name: Wait for deployment to complete
        run: |
          aws elasticbeanstalk wait environment-updated \
            --application-name "${{ secrets.EB_APPLICATION_NAME }}" \
            --environment-name "${{ secrets.EB_ENVIRONMENT_NAME }}"